name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  required-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tryon-local/package-lock.json
            Testing py/fb auto testing py/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install app dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install try-on dependencies
        run: npm --prefix tryon-local ci

      - name: Install Firebase rules test dependencies
        run: npm --prefix "Testing py/fb auto testing py" ci

      - name: Run required checks
        run: npm run ci:required

      - name: Run Firebase rules tests
        run: npm run check:rules
